name: Bug Report
description: Report a bug to help us improve. Do NOT use this for security vulnerabilities.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        > **Security vulnerabilities: stop.** Report privately via [GitHub Security Advisory](https://github.com/layervai/qurl-go/security/advisories/new) or email `security@layerv.ai`. Do NOT open a public issue.
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: |
        - **critical** — production outage potential, data loss risk, live-customer breakage
        - **high** — significant user impact, blocker for other work, correctness bug in shipped feature
        - **medium** — standard bug, non-urgent
        - **low** — polish, minor fix, tech debt
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Include a minimal code snippet or test that triggers the bug, and any config or inputs involved.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      # Keep this list aligned with the PR-title scopes in
      # .github/workflows/pr-title.yml, EXCEPT for `other` — that's a
      # reporter-UX escape hatch, not a valid commit scope. Adding a
      # new package? Update both places in the same PR.
      description: Which package does this affect? (or pick `other` for cross-cutting).
      options:
        - qurl
        - qv2
        - relayknock
        - ci
        - deps
        - other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Module version
      description: The version of `github.com/layervai/qurl-go` you depend on (the `require` line in your go.mod, or the git tag / commit SHA).
      placeholder: e.g. v0.1.0 or a commit SHA
    validations:
      required: true
  - type: input
    id: go_version
    attributes:
      label: Go version
      placeholder: e.g. 1.26.x (paste from `go version`)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / arch
      placeholder: e.g. macOS 15 arm64, Ubuntu 24.04 amd64, Windows 11
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error output
      description: |
        Paste the error, panic, or stack trace.
        **Redact before pasting:** bearer tokens, API keys (`lv_live_…` / `lv_test_…`), private keys, and customer identifiers.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, related issues, prior discussion, anything else worth knowing.
