name: Agent-reg vectors drift

# Guards the VENDORED agent-registration golden vectors
# (relayknock/testdata/agent_registration_golden.json) against the canonical
# qurl-conformance source. The vendored copy is a temporary, byte-identical
# hand-copy (the conformance Go module does not yet expose an
# AgentRegistrationGolden() accessor for these vectors — see
# relayknock/agent_registration_golden_test.go and issue #50). Without this job the
# vendored copy could silently diverge from upstream and the in-repo byte-exact
# fence would keep passing against stale bytes.
#
# What this job does:
#   1. Recompute the vendored file's SHA-256 and assert it equals the digest the
#      Go fence pins (VENDORED_SHA256 below must track agentRegVectorsSHA256 in
#      relayknock/agent_registration_golden_test.go). This alone catches a local
#      edit even if upstream is unreachable.
#   2. Fetch the canonical copy from qurl-conformance and, if present, assert it is
#      byte-identical to the vendored copy. A real content drift FAILS the job.
#
# Upstream availability, by design:
#   These vectors currently live in qurl-conformance PR #20 and are NOT yet on its
#   default branch. Until that PR merges, the canonical file 404s on `main`; this
#   job then keeps the local SHA gate as a hard failure but only WARNS (does not
#   fail) on the missing upstream file, so day-to-day PRs are not blocked on a file
#   upstream has not published. Once PR #20 merges to conformance `main` (or the
#   module is tagged), set REQUIRE_UPSTREAM to "true" below so an unreachable
#   upstream also fails — at that point the whole vendoring should be replaced by
#   the published conformance accessor and this job retired (issue #50).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly, so upstream drift is caught on its own cadence rather than only
    # when an unrelated PR happens to run CI. (Dormant until REQUIRE_UPSTREAM is
    # flipped and CANONICAL_REF points at the released vectors; issue #50 tracks
    # the migration to the published conformance accessor.)
    - cron: "17 7 * * *"

permissions:
  contents: read

env:
  # Path to the vendored artifact, relative to the repo root.
  VENDORED_PATH: relayknock/testdata/agent_registration_golden.json
  # Must equal agentRegVectorsSHA256 in
  # relayknock/agent_registration_golden_test.go. Bump both together, and only for
  # a deliberate upstream re-vendor.
  VENDORED_SHA256: 77dc8634eb15e8a986df1093923b70b341386ba3c15421814ffed1a668f2d2bc
  # Canonical upstream source. CONFORMANCE_REF is the ref to diff against; it
  # defaults to the conformance default branch. While the vectors are still in
  # qurl-conformance PR #20, override via workflow_dispatch (or temporarily change
  # the default) to that PR's head branch to exercise the byte-diff early.
  CONFORMANCE_REPO: layervai/qurl-conformance
  CONFORMANCE_REF: main
  CONFORMANCE_PATH: vectors/agent_registration_golden.json
  # Flip to "true" once the vectors are on the conformance default branch (PR #20
  # merged) or the module is tagged, so a missing/unreachable upstream also fails.
  REQUIRE_UPSTREAM: "false"

jobs:
  drift:
    name: vendored vectors vs qurl-conformance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Assert vendored file matches the pinned SHA-256
        run: |
          set -euo pipefail
          if [ ! -f "$VENDORED_PATH" ]; then
            echo "::error::vendored vectors not found at $VENDORED_PATH"
            exit 1
          fi
          got="$(sha256sum "$VENDORED_PATH" | cut -d' ' -f1)"
          if [ "$got" != "$VENDORED_SHA256" ]; then
            echo "::error::vendored $VENDORED_PATH SHA-256 = $got, want $VENDORED_SHA256."
            echo "::error::The vendored copy was edited. It must stay byte-identical to the qurl-conformance source;"
            echo "::error::re-vendor from upstream and update VENDORED_SHA256 here AND agentRegVectorsSHA256 in the Go fence."
            exit 1
          fi
          echo "vendored SHA-256 OK: $got"

      - name: Diff vendored copy against canonical qurl-conformance
        run: |
          set -euo pipefail
          url="https://raw.githubusercontent.com/${CONFORMANCE_REPO}/${CONFORMANCE_REF}/${CONFORMANCE_PATH}"
          echo "Fetching canonical vectors: $url"
          # -f: fail (non-zero) on HTTP >= 400 rather than saving an error body.
          # --retry: don't let a transient 5xx/connection blip be misread as
          # "upstream absent" (which, once REQUIRE_UPSTREAM=true, would hard-fail a PR).
          if curl -fsSL --retry 3 --retry-connrefused "$url" -o upstream.json; then
            up="$(sha256sum upstream.json | cut -d' ' -f1)"
            local="$(sha256sum "$VENDORED_PATH" | cut -d' ' -f1)"
            echo "upstream SHA-256 = $up"
            echo "vendored SHA-256 = $local"
            if [ "$up" != "$local" ]; then
              echo "::error::Vendored $VENDORED_PATH has DRIFTED from ${CONFORMANCE_REPO}@${CONFORMANCE_REF}:${CONFORMANCE_PATH}."
              echo "::error::Re-vendor the file verbatim from upstream and update the pinned SHA-256 in both places."
              echo "--- unified diff (upstream vs vendored) ---"
              diff -u upstream.json "$VENDORED_PATH" || true
              exit 1
            fi
            echo "Vendored copy is byte-identical to canonical upstream."
          else
            msg="Canonical vectors not reachable at $url (expected while qurl-conformance PR #20 is unmerged / the module is untagged)."
            if [ "$REQUIRE_UPSTREAM" = "true" ]; then
              echo "::error::$msg REQUIRE_UPSTREAM=true, so this is a failure."
              exit 1
            fi
            echo "::warning::$msg Skipping the upstream byte-diff; the pinned-SHA gate above still ran. Set REQUIRE_UPSTREAM=true once the vectors land on the conformance default branch."
          fi
