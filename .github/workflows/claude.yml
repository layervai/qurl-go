name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Resolve checkout ref
        id: checkout-ref
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            issue_comment)
              if jq -e '.issue.pull_request != null' "$GITHUB_EVENT_PATH" >/dev/null; then
                pr_number="$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")"
                sha="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$pr_number" --jq '.head.sha')"
              else
                sha="$GITHUB_SHA"
              fi
              ;;
            pull_request_review_comment|pull_request_review)
              sha="$(jq -r '.pull_request.head.sha' "$GITHUB_EVENT_PATH")"
              ;;
            *)
              sha="$GITHUB_SHA"
              ;;
          esac

          if [[ ! "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "invalid checkout SHA: $sha" >&2
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: ${{ steps.checkout-ref.outputs.sha }}
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@2fee15510437d71399d9139ed60433470484a8fb # v1.0.153
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Repeated full Claude reports dominate context on long-running PRs
          # and can make the SDK exit before inference. Human requests and
          # dispositions remain available while prior bot transcripts do not.
          exclude_comments_by_actor: '*[bot]'
          claude_args: '--model claude-opus-4-8'
