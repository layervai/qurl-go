name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    # Name must stay exactly "vet + test -race" — it is a required status check
    # in main's branch protection. Renaming it would orphan the required context
    # and block every merge.
    name: vet + test -race
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Single source of the Go toolchain version: go.mod. No second place to
      # bump, and it tracks the version the module already declares.
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          check-latest: true

      # Gate go.mod/go.sum tidiness inside this required check rather than
      # auto-pushing a fix from a separate workflow. A push made with the
      # default GITHUB_TOKEN does not re-trigger required checks (GitHub's
      # recursion guard), so an auto-tidy commit could merge unvalidated.
      # Failing here forces the drift onto a commit CI actually runs.
      - name: Verify go.mod/go.sum are tidy
        run: |
          go mod tidy
          # --exit-code prints the drift AND returns non-zero in one shot.
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::go.mod/go.sum are not tidy. Run 'go mod tidy' locally and commit the result."
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test -race + coverage
        run: go test -race -covermode=atomic -coverprofile=coverage.txt ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.txt | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.txt
          if-no-files-found: error

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          check-latest: true

      # Pinned action + pinned linter version, matching the Makefile's
      # GOLANGCI_LINT_VERSION, so local `make lint` and CI run the same analyzers.
      # `golangci-lint run` also enforces formatting (gofmt/gofumpt/goimports).
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          check-latest: true

      # Fails the job on a known vuln in called code — the right default for a
      # security SDK. NOTE: this only gates merges once added to main's branch
      # protection required checks (tracked in #22); until then it is advisory.
      # Trade-off: a newly published stdlib/dep advisory can turn this red with no
      # code change — when that happens, bump the go.mod toolchain directive or the
      # affected dependency.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0

      - name: govulncheck
        run: govulncheck ./...

  # Note: live fuzzing is intentionally NOT a PR gate — a fuzzer can surface a
  # new, possibly unrelated crasher and red an otherwise-good PR nondeterministically.
  # The committed seed corpus (including regression crashers) is replayed
  # deterministically by the `test` job's plain `go test`, which IS the blocking
  # regression gate. Live fuzzing runs as a nightly soak in fuzz.yml.

  # ============================================================================
  # NOTIFY - Send Slack notification on build completion
  # ============================================================================
  # Mirrors qurl-python's CI notify job (same payload format) so #build-notifications
  # gets a consistent card across the fleet. The target channel is determined by
  # the SLACK_WEBHOOK_URL secret's incoming-webhook configuration, not the payload.
  notify:
    name: Notify
    needs: [test, lint, vuln]
    # `!cancelled()` rather than `always()`: this repo sets
    # concurrency.cancel-in-progress, so a newer push to main cancels the
    # in-flight run. `always()` would still fire notify on that cancelled run
    # and post a yellow "cancelled" card for every superseded push — chatter
    # the fleet's other CIs (no cancel-in-progress) never produce. We still
    # notify on success and failure; we only stay quiet when the whole run is
    # cancelled out from under us.
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEST_RESULT: ${{ needs.test.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          VULN_RESULT: ${{ needs.vuln.result }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          # All github context moved to env to prevent script injection
          # via crafted branch names or actor names containing shell metacharacters.
          GH_SERVER_URL: ${{ github.server_url }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_SHA: ${{ github.sha }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_ACTOR: ${{ github.actor }}
          GH_EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ -z "$SLACK_WEBHOOK" ]]; then
            echo "SLACK_WEBHOOK_URL not configured, skipping notification"
            exit 0
          fi

          WORKFLOW_URL="${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}"
          SHORT_SHA="${GH_SHA:0:7}"
          COMMIT_URL="${GH_SERVER_URL}/${GH_REPOSITORY}/commit/${GH_SHA}"

          # First line of the commit message, derived once via parameter
          # expansion (strip from the first newline on). Pure-shell so it is
          # immune to the SIGPIPE/pipefail edge of `echo "$msg" | head -n1`
          # under the runner's `set -eo pipefail`, and reused for both trigger
          # detection and the rendered commit field below.
          COMMIT_FIRST_LINE="${COMMIT_MESSAGE%%$'\n'*}"

          # Determine trigger source
          TRIGGER="$GH_EVENT_NAME"
          case "$TRIGGER" in
            push)
              if [[ "$COMMIT_FIRST_LINE" == *"Merge pull request"* ]]; then
                TRIGGER_TEXT="PR merge"
              else
                TRIGGER_TEXT="Push"
              fi
              ;;
            workflow_dispatch) TRIGGER_TEXT="Manual" ;;
            *) TRIGGER_TEXT="$TRIGGER" ;;
          esac

          # Aggregate status across all three gates (test + lint + vuln). A
          # lint or vuln failure is a red build even if tests passed, so the
          # Slack message must reflect the worst of the three.
          if [[ "$TEST_RESULT" == "success" && "$LINT_RESULT" == "success" && "$VULN_RESULT" == "success" ]]; then
            AGGREGATE="success"
          elif [[ "$TEST_RESULT" == "failure" || "$LINT_RESULT" == "failure" || "$VULN_RESULT" == "failure" ]]; then
            AGGREGATE="failure"
          elif [[ "$TEST_RESULT" == "cancelled" || "$LINT_RESULT" == "cancelled" || "$VULN_RESULT" == "cancelled" ]]; then
            AGGREGATE="cancelled"
          else
            AGGREGATE="incomplete"
          fi

          # Determine status. HEADER is constant across all branches — only
          # color/emoji/text change with the aggregate result.
          HEADER="qURL Go SDK Build"
          if [[ "$AGGREGATE" == "success" ]]; then
            COLOR="#36a64f"; EMOJI=":white_check_mark:"; STATUS_TEXT="successful"
          elif [[ "$AGGREGATE" == "failure" ]]; then
            COLOR="#dc3545"; EMOJI=":x:"; STATUS_TEXT="failed"
          else
            # cancelled or incomplete — both warn-yellow, and the status text
            # is just the aggregate token itself.
            COLOR="#ffc107"; EMOJI=":warning:"; STATUS_TEXT="$AGGREGATE"
          fi

          # Determine per-gate emoji so the Slack message shows which
          # gate failed when the aggregate is red.
          gate_emoji() {
            case "$1" in
              success) echo ":white_check_mark:" ;;
              failure) echo ":x:" ;;
              *) echo ":warning:" ;;
            esac
          }
          TEST_EMOJI=$(gate_emoji "$TEST_RESULT")
          LINT_EMOJI=$(gate_emoji "$LINT_RESULT")
          VULN_EMOJI=$(gate_emoji "$VULN_RESULT")

          # Truncate the first line to 100 chars for the card. head_commit is
          # absent on workflow_dispatch (this repo allows manual runs), leaving
          # COMMIT_MESSAGE empty — fall back so the card never renders an empty
          # `*Commit:* ` field with bare backticks.
          FIRST_LINE="${COMMIT_FIRST_LINE:0:100}"
          FIRST_LINE="${FIRST_LINE:-(no commit message)}"

          # Build payload with jq — handles all JSON escaping automatically.
          # Shell string concatenation broke on commit messages with special chars.
          PAYLOAD=$(jq -n \
            --arg color "$COLOR" \
            --arg emoji "$EMOJI" \
            --arg header "$HEADER" \
            --arg status "$STATUS_TEXT" \
            --arg branch "$GH_REF_NAME" \
            --arg sha "$SHORT_SHA" \
            --arg trigger "$TRIGGER_TEXT" \
            --arg actor "$GH_ACTOR" \
            --arg test_emoji "$TEST_EMOJI" \
            --arg lint_emoji "$LINT_EMOJI" \
            --arg vuln_emoji "$VULN_EMOJI" \
            --arg commit "$FIRST_LINE" \
            --arg commit_url "$COMMIT_URL" \
            --arg workflow_url "$WORKFLOW_URL" \
            '{attachments: [{color: $color, blocks: [
              {type: "section", text: {type: "mrkdwn", text: ("\($emoji) *\($header)* \($status)")}},
              {type: "section", fields: [
                {type: "mrkdwn", text: ("*Branch:*\n`\($branch)` (\($sha))")},
                {type: "mrkdwn", text: ("*Trigger:*\n\($trigger) by \($actor)")},
                {type: "mrkdwn", text: ("*Tests:*\n\($test_emoji)")},
                {type: "mrkdwn", text: ("*Lint:*\n\($lint_emoji)")},
                {type: "mrkdwn", text: ("*Vuln:*\n\($vuln_emoji)")}
              ]},
              {type: "section", text: {type: "mrkdwn", text: ("*Commit:* `\($commit)`")}},
              {type: "context", elements: [
                {type: "mrkdwn", text: ("<\($commit_url)|\($sha)>  |  <\($workflow_url)|View workflow>")}
              ]}
            ]}]}')

          curl -sfS -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Slack notification failed (non-critical)"
