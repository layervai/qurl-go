name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    # Name must stay exactly "vet + test -race" — it is a required status check
    # in main's branch protection. Renaming it would orphan the required context
    # and block every merge.
    name: vet + test -race
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Single source of the Go toolchain version: go.mod. No second place to
      # bump, and it tracks the version the module already declares.
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          check-latest: true

      # Gate go.mod/go.sum tidiness inside this required check rather than
      # auto-pushing a fix from a separate workflow. A push made with the
      # default GITHUB_TOKEN does not re-trigger required checks (GitHub's
      # recursion guard), so an auto-tidy commit could merge unvalidated.
      # Failing here forces the drift onto a commit CI actually runs.
      - name: Verify go.mod/go.sum are tidy
        run: |
          go mod tidy
          # --exit-code prints the drift AND returns non-zero in one shot.
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::go.mod/go.sum are not tidy. Run 'go mod tidy' locally and commit the result."
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test -race + coverage
        run: go test -race -covermode=atomic -coverprofile=coverage.txt ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.txt | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.txt
          if-no-files-found: error

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          check-latest: true

      # Workflow changes carry credentials and are part of the executable
      # security boundary. Keep syntax validation inside the existing required
      # lint context so this hardening does not create a new branch-protection
      # check that could strand unrelated pull requests.
      - name: actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0

      # Pinned action + pinned linter version, matching the Makefile's
      # GOLANGCI_LINT_VERSION, so local `make lint` and CI run the same analyzers.
      # `golangci-lint run` also enforces formatting (gofmt/gofumpt/goimports).
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          check-latest: true

      # Fails the job on a known vuln in called code — the right default for a
      # security SDK. NOTE: this only gates merges once added to main's branch
      # protection required checks (tracked in #22); until then it is advisory.
      # Trade-off: a newly published stdlib/dep advisory can turn this red with no
      # code change — when that happens, bump the go.mod toolchain directive or the
      # affected dependency.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0

      - name: govulncheck
        run: govulncheck ./...

  # awsstore is a SEPARATE Go module (github.com/layervai/qurl-go/awsstore) that
  # isolates the AWS SDK v2 dependency so the root module stays AWS-SDK-free. The
  # root `test`/`lint`/`vuln` jobs run at the repo root and never enter it, so it
  # gets its own job that mirrors the root gates (tidy, vet, test -race, lint,
  # vuln) inside ./awsstore. It builds against the in-tree parent via the
  # repo-root go.work; go.work is committed, so `go test ./...` here resolves the
  # local parent with no tag. This is a gate for the submodule, not the root — do
  # NOT fold it into the required "vet + test -race" context.
  awsstore:
    name: awsstore module
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: awsstore
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Toolchain from the submodule's own go.mod (it matches the root's).
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: awsstore/go.mod
          check-latest: true

      # Same tidiness gate as the root, scoped to the submodule's go.mod/go.sum.
      - name: Verify go.mod/go.sum are tidy
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::awsstore go.mod/go.sum are not tidy. Run 'go mod tidy' in ./awsstore and commit."
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test -race + coverage
        run: go test -race -covermode=atomic -coverprofile=coverage.txt ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.txt | tail -1

      # Pinned action + pinned linter version, matching the root job and the
      # Makefile's GOLANGCI_LINT_VERSION. working-directory scopes it to awsstore.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          working-directory: awsstore

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0

      - name: govulncheck
        run: govulncheck ./...

  # Note: live fuzzing is intentionally NOT a PR gate — a fuzzer can surface a
  # new, possibly unrelated crasher and red an otherwise-good PR nondeterministically.
  # The committed seed corpus (including regression crashers) is replayed
  # deterministically by the `test` job's plain `go test`, which IS the blocking
  # regression gate. Live fuzzing runs as a nightly soak in fuzz.yml.

  # Slack build-completion card. Thin shim over the fleet-shared reusable
  # in layervai/ops-routines-workflows (public mirror of private
  # layervai/ops-routines); the curl/jq Block Kit payload builder and the
  # gate-result aggregation live there now. Adding/removing a gate is a
  # one-line edit to `needs:` + `gates:` here — no aggregation if-chain.
  notify:
    name: Notify
    needs: [test, lint, vuln, awsstore]
    # `!cancelled()` rather than `always()`: this repo sets
    # concurrency.cancel-in-progress, so a newer push to main cancels the
    # in-flight run. `always()` would still post a yellow "cancelled" card
    # for every superseded push — chatter the fleet's other CIs (no
    # cancel-in-progress) never produce. We still notify on success and
    # failure; we only stay quiet when the run is cancelled out from under us.
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    permissions: {}
    uses: layervai/ops-routines-workflows/.github/workflows/notify.yml@1536c698add5777aa08c781bc674d1eba469b32d # v0.9.0
    with:
      header: "qURL Go SDK Build"
      gates: '{"Tests": "${{ needs.test.result }}", "Lint": "${{ needs.lint.result }}", "Vuln": "${{ needs.vuln.result }}", "awsstore": "${{ needs.awsstore.result }}"}'
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
