name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          scopes: |
            qurl
            qv2
            relayknock
            ci
            deps
          requireScope: false
          # Allow a leading capital so Dependabot's auto-generated
          # "Bump <dep> from X to Y" subjects pass. Dependabot capitalizes
          # "Bump" and offers no config to lowercase it, so a strict
          # `^[a-z]` permanently blocks the required check on every
          # dependabot PR. "Start with a letter" keeps titles tidy without
          # fighting the bot.
          subjectPattern: ^[A-Za-z].*$
          subjectPatternError: |
            Subject must start with a letter.
            Example: "feat(qurl): add batch resolve helper"
